name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Langkah krusial agar GitHub bisa merakit untuk arsitektur ARM (STB/Armbian)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # Langkah krusial untuk mengaktifkan fitur multi-platform build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Multi-Arch
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Menginstruksikan build ke 3 jenis prosesor sekaligus
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ secrets.DOCKER_USERNAME }}/mikhmon-pppoe:latest
